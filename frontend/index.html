<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon/main.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Injected code for hosted version -->
    <%- injectHead %>

    <title>Image to Code | Turn screenshots into shippable front-end</title>
    <meta
      name="description"
      content="Upload screenshots, mockups, or URLs and generate front-end code you can preview, edit, and ship."
    />

    <!-- Open Graph Meta Tags -->
    <meta
      property="og:title"
      content="Image to Code | Turn screenshots into shippable front-end"
    />
    <meta
      property="og:description"
      content="Upload screenshots, mockups, or URLs and generate front-end code you can preview, edit, and ship."
    />
    <meta
      property="og:image"
      content="https://screenshottocode.com/brand/twitter-summary-card.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="628" />
    <meta property="og:url" content="https://screenshottocode.com" />
    <meta property="og:type" content="website" />
    <!-- Twitter Card tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@picoapps" />
    <!-- Keep in sync with og:title, og:description and og:image -->
    <meta
      name="twitter:title"
      content="Image to Code | Turn screenshots into shippable front-end"
    />
    <meta
      name="twitter:description"
      content="Upload screenshots, mockups, or URLs and generate front-end code you can preview, edit, and ship."
    />
    <meta
      name="twitter:image"
      content="https://screenshottocode.com/brand/twitter-summary-card.png"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
