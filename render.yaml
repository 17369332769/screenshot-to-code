services:
  - type: web
    name: screenshot-to-code-backend
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: uvx poetry install
    startCommand: uvx poetry run uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/healthz
    envVars:
      - key: IS_PROD
        value: "true"
      - key: ALLOWED_CORS_ORIGINS
        sync: false
      - key: SCREENSHOT_TO_CODE_DATA_DIR
        value: /var/data/screenshot-to-code
      - key: LOCAL_ASSET_DIR
        value: /var/data/screenshot-to-code/local-assets
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: QUICKROUTER_IMAGE_API_KEY
        sync: false
      - key: QUICKROUTER_IMAGE_BASE_URL
        value: https://api.quickrouter.ai/v1
      - key: QUICKROUTER_IMAGE_MODEL
        value: gpt-image-2-all
      - key: RUNNINGHUB_API_KEY
        sync: false
      - key: RUNNINGHUB_BASE_URL
        value: https://www.runninghub.cn
      - key: RUNNINGHUB_IMAGE_MODEL
        value: rhart-image-g-2-official/text-to-image
      - key: IS_DEBUG_ENABLED
        value: "false"
      - key: PROMPT_REPORTS_ENABLED
        value: "false"
    disk:
      name: screenshot-to-code-data
      mountPath: /var/data/screenshot-to-code
      sizeGB: 5

  - type: web
    name: screenshot-to-code-frontend
    runtime: static
    rootDir: frontend
    buildCommand: pnpm install --frozen-lockfile && pnpm build-hosted
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_HTTP_BACKEND_URL
        sync: false
      - key: VITE_WS_BACKEND_URL
        sync: false
      - key: VITE_IS_DEPLOYED
        value: "true"
      - key: VITE_PICO_BACKEND_FORM_SECRET
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
